version: '3.8'

services:
  db:
    image: postgres:latest  # Utilise une image légère et une version spécifique
    container_name: postgresql
    restart: always            # Redémarre automatiquement en cas de crash
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"            # Expose le port vers l'hôte (Hôte:Conteneur)
    volumes:
      - pgdata:/var/lib/postgresql  # Persistance des données
    healthcheck:               # Vérifie que la DB est prête avant que d'autres services ne se connectent
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:                      # Volume nommé géré par Docker
